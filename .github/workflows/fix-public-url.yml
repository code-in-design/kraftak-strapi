name: Fix PUBLIC_URL

on:
  workflow_dispatch:

env:
  EC2_HOST: 13.209.112.166
  EC2_USER: ec2-user

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>&1

      - name: Update PUBLIC_URL and restart
        run: |
          ssh ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'EOF'
          cd /home/ec2-user/kraftak-strapi

          echo "=== Before ==="
          grep PUBLIC_URL .env

          # PUBLIC_URL 변경
          sed -i 's|PUBLIC_URL=http://13.209.112.166:1337|PUBLIC_URL=https://api.kraftak.com|' .env

          echo ""
          echo "=== After ==="
          grep PUBLIC_URL .env

          echo ""
          echo "=== Restarting PM2 ==="
          pm2 restart kraftak-prod
          sleep 5
          pm2 status
          EOF

      - name: Verify redirect
        run: |
          sleep 10
          echo "=== Checking https://api.kraftak.com/admin ==="
          curl -sL -o /dev/null -w "Final URL: %{url_effective}\nHTTP: %{http_code}\n" "https://api.kraftak.com/admin"

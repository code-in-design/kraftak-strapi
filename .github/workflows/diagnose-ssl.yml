name: Diagnose SSL Auto-Renewal

on:
  workflow_dispatch:

env:
  EC2_HOST: 13.209.112.166
  EC2_USER: ec2-user

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>&1

      - name: Diagnose certbot auto-renewal
        run: |
          ssh ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'EOF'
          echo "=== 1. certbot timer (systemd) ==="
          sudo systemctl list-timers --all 2>&1 | grep -i cert || echo "certbot timer NOT found"
          echo ""
          sudo systemctl status certbot-renew.timer 2>&1 || echo "certbot-renew.timer does not exist"
          echo ""
          sudo systemctl status snap.certbot.renew.timer 2>&1 || echo "snap.certbot.renew.timer does not exist"

          echo ""
          echo "=== 2. crontab entries ==="
          sudo crontab -l 2>&1 || echo "no root crontab"
          echo ""
          crontab -l 2>&1 || echo "no ec2-user crontab"
          echo ""
          cat /etc/cron.d/certbot 2>/dev/null || echo "/etc/cron.d/certbot does not exist"

          echo ""
          echo "=== 3. certbot install method ==="
          which certbot 2>&1
          certbot --version 2>&1
          rpm -qa | grep certbot 2>&1 || echo "not installed via rpm"
          snap list certbot 2>&1 || echo "not installed via snap"

          echo ""
          echo "=== 4. certbot renew dry-run ==="
          sudo certbot renew --dry-run 2>&1

          echo ""
          echo "=== 5. certbot renewal config ==="
          ls -la /etc/letsencrypt/renewal/ 2>&1
          cat /etc/letsencrypt/renewal/api.kraftak.com.conf 2>&1
          EOF
